# Netlify config for the Tommy Kneeland hub (static site)
[build]
  publish = "."

# Long cache for images, always revalidate the HTML
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

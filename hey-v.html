<style>
  :root{
    --bg:#120d1a;
    --card:#241a3a;
    --text:#f5f0ff;
    --muted:#b3a8cc;
    --accent:#ff4d8d;
    --accent2:#ffce3a;
    --accent3:#36e0c8;
    --line:rgba(255,255,255,.10);
    --spotify:#1DB954;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(255,77,141,.18), transparent 60%),
      radial-gradient(900px 500px at 100% 20%, rgba(54,224,200,.12), transparent 55%),
      radial-gradient(900px 600px at 0% 80%, rgba(255,206,58,.10), transparent 55%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:32px 18px;
    line-height:1.5;
  }
  .wrap{width:100%;max-width:400px;text-align:center}

  .cover-wrap{margin:0 auto 26px;width:260px;height:260px}
  .cover{
    width:260px;height:260px;border-radius:20px;object-fit:cover;display:block;
    box-shadow:0 14px 40px rgba(0,0,0,.5);
  }

  .kicker{
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent2);
    margin-bottom:10px;
  }
  h1{font-size:38px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
  .artist{color:var(--muted);font-size:16px;margin-bottom:28px}

  .platforms{display:flex;flex-direction:column;gap:12px}
  .stream-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-weight:800;font-size:17px;
    padding:16px 24px;border-radius:999px;text-decoration:none;
    transition:transform .15s ease,box-shadow .15s ease;
  }
  .stream-btn svg{width:22px;height:22px}
  .stream-btn:hover{transform:translateY(-2px)}

  .stream-btn.spotify{background:var(--spotify);color:#000;box-shadow:0 8px 26px rgba(29,185,84,.35)}
  .stream-btn.spotify:hover{box-shadow:0 10px 30px rgba(29,185,84,.45)}
  .stream-btn.spotify svg{fill:#000}

  .stream-btn.apple{background:#000;color:#fff;border:1px solid rgba(255,255,255,.15);box-shadow:0 8px 26px rgba(0,0,0,.45)}
  .stream-btn.apple:hover{box-shadow:0 10px 30px rgba(0,0,0,.55)}
  .stream-btn.apple svg{fill:#fff}

  .stream-btn.youtube{background:#FF0000;color:#fff;box-shadow:0 8px 26px rgba(255,0,0,.35)}
  .stream-btn.youtube:hover{box-shadow:0 10px 30px rgba(255,0,0,.45)}
  .stream-btn.youtube svg{fill:#fff}

  .other{
    display:block;margin-top:18px;color:var(--muted);font-size:15px;
    text-decoration:none;border-bottom:1px solid transparent;
  }
  .other:hover{color:var(--text);border-color:var(--muted)}

  footer{margin-top:38px;color:var(--muted);font-size:14px;opacity:.85}
  footer a{color:var(--accent3);text-decoration:none;font-weight:600}
  footer a:hover{text-decoration:underline}
</style>
</head>
